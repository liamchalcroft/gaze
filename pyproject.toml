# Legacy Poetry config - REMOVED in favor of uv/PEP 621
# Modern dependency management should use uv and [project] section below

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.black]
line-length = 100
target-version = ['py310']

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # bandit (security)
    "T20", # flake8-print
    "SIM", # flake8-simplify
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate (commented code)
    "PL",  # pylint
    "PERF", # perflint
]
ignore = [
    "S101",  # assert usage (common in tests)
    "PLR0913", # too many arguments
    "PLR0912", # too many branches
    "PLR0915", # too many statements
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "PLR2004", "PLC0415", "E402", "ARG001"]
"scripts/**/*.py" = ["T201", "S602", "S603", "PLW1510"]
"run_tests.py" = ["T201", "S603", "PLW1510"]
"src/nova_retrieval_vlm/visualization/**/*.py" = ["T201", "PTH123"]

[tool.ruff.lint.isort]
known-first-party = ["nova_retrieval_vlm"]
force-single-line = true

# Replace mypy with pyright for better performance and VS Code integration
# mypy config kept for backwards compatibility during transition
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
strict = true

# Modern pyright configuration
[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.10"
executionEnvironments = [
    { root = "src" },
    { root = "tests", extraPaths = ["src"] },
    { root = "scripts", extraPaths = ["src"] }
]
reportMissingImports = true
reportMissingTypeStubs = false
reportUnusedImport = true
reportUnusedClass = true
reportUnusedFunction = true
reportDuplicateImport = true
reportUnnecessaryTypeIgnoreComment = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers --tb=short"
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["nova_retrieval_vlm"]
omit = [
    "*/tests/*",
    "*/scripts/*",
    "*/migrations/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[project]
authors = [
    {name = "Research Team", email = "research@example.com"},
]
license = {text = "MIT"}
requires-python = ">=3.10,<4.0"
dependencies = [
    "timm",
    "datasets",
    "torchmetrics[detection]",
    # Configuration & Logging
    "hydra-core",
    "omegaconf",
    "loguru",
    "python-dotenv",
    # Data & Scientific Computing
    "numpy",
    "pandas",
    "scipy",
    "scikit-learn",
    "scikit-image",
    # Image Processing & Medical
    "pillow",
    "opencv-python",
    "nibabel",
    "pydicom",
    # Retrieval & Search
    "haystack-ai",
    "faiss-cpu",
    "pypdf",
    "langchain",
    "readability-lxml",
    "simhash",
    "langdetect",
    # API Clients
    "openai",
    "anthropic",
    "httpx",
    "requests",
    # Evaluation Metrics
    "rouge-score",
    "sacrebleu",
    "bert-score",
    "radgraph",
    # Visualization
    "matplotlib",
    "seaborn",
    "plotly",
    "streamlit",
    # Utilities
    "tqdm",
    "more-itertools",
    "toolz",
    "pydantic-settings",
    # Type Safety & Runtime Checking
    "jaxtyping",
    "beartype",
    "jax[cpu]",
    "torch>=2.7.1",
    "torchvision>=0.22.1",
    "transformers>=4.52.4",
    "sentence-transformers>=5.1.0",
]
name = "nova-retrieval-vlm"
version = "0.1.0"
description = "Advanced retrieval-augmented medical VLM for NOVA dataset analysis with state-of-the-art reasoning capabilities"
readme = "README.md"

[project.scripts]
nova-vlm = "nova_retrieval_vlm.cli:main"

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "pytest-mock",
    "pytest-benchmark",
    "ruff",
    "pyright",
    "pre-commit",
    "jupyterlab",
    "ipywidgets",
    "typeguard",
]
