[tool.poetry]
name = "nova-retrieval-vlm"
version = "0.1.0"
description = "Advanced retrieval-augmented medical VLM for NOVA dataset analysis with state-of-the-art reasoning capabilities"
authors = ["Research Team <research@example.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "nova_retrieval_vlm", from = "src" }]

[tool.poetry.dependencies]
python = "^3.9"
torch = "^2.0.0"
torchvision = "^0.15.0"
timm = "^0.9.7"
haystack-ai = ">=2.12.0"
transformers = "^4.30.0"
datasets = "^2.12.0"
hydra-core = "^1.3.0"
omegaconf = "^2.3.0"
loguru = "^0.7.0"
pillow = "^10.0.0"
requests = "^2.31.0"
tqdm = "^4.65.0"
numpy = "^1.24.0"
pandas = "^2.0.0"
scikit-learn = "^1.3.0"
matplotlib = "^3.7.0"
seaborn = "^0.12.0"
wandb = "^0.15.0"
tensorboard = "^2.13.0"
jupyter = "^1.0.0"
ipykernel = "^6.23.0"
# Advanced retrieval dependencies
sentence-transformers = "^2.2.2"
pypdf = "^4.2.0"
faiss-cpu = "^1.7.4"
langchain = "^0.3.25"
# Cross-encoder for re-ranking
# Visual analysis dependencies
opencv-python = "^4.8.0"
scikit-image = "^0.21.0"
scipy = "^1.11.0"
# Medical image processing
nibabel = "^5.1.0"
pydicom = "^2.4.0"
# API integrations
openai = "^1.0.0"
anthropic = "^0.25.0"
# Evaluation metrics
rouge-score = "^0.1.2"
sacrebleu = "^2.3.1"
bert-score = "^0.3.13"
streamlit = "^1.28.0"
readability-lxml = "^0.8.1"
langdetect = "^1.0.9"
simhash = "^2.1.2"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
black = "^23.7.0"
isort = "^5.12.0"
ruff = "^0.0.280"
mypy = "^1.5.0"
pre-commit = "^3.3.0"

[tool.poetry.scripts]
nova-vlm = "nova_retrieval_vlm.cli:main"


[tool.pdm.build]
includes = ["src/nova_retrieval_vlm"]
[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.black]
line-length = 100
target-version = ['py39']

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers"
testpaths = ["tests"]

[tool.poetry.extras]
vis = ["wandb", "neptune-client"]

[project]
authors = [
    {name = "Research Team", email = "research@example.com"},
]
license = {text = "MIT"}
requires-python = "<4.0,>=3.9"
dependencies = [
    "torch>=2.0.0,<3.0.0",
    "torchvision>=0.15.0,<1.0.0",
    "timm>=0.9.7",
    "transformers<5.0.0,>=4.30.0",
    "datasets<3.0.0,>=2.12.0",
    "hydra-core<2.0.0,>=1.3.0",
    "omegaconf<3.0.0,>=2.3.0",
    "loguru<1.0.0,>=0.7.0",
    "pillow<11.0.0,>=10.0.0",
    "requests<3.0.0,>=2.31.0",
    "tqdm<5.0.0,>=4.65.0",
    "numpy<2.0.0,>=1.24.0",
    "pandas<3.0.0,>=2.0.0",
    "scikit-learn<2.0.0,>=1.3.0",
    "matplotlib<4.0.0,>=3.7.0",
    "seaborn<1.0.0,>=0.12.0",
    "wandb<1.0.0,>=0.15.0",
    "tensorboard<3.0.0,>=2.13.0",
    "jupyter<2.0.0,>=1.0.0",
    "ipykernel<7.0.0,>=6.23.0",
    "sentence-transformers<3.0.0,>=2.2.2",
    "pypdf<5.0.0,>=4.2.0",
    "faiss-cpu<2.0.0,>=1.7.4",
    "opencv-python<5.0.0,>=4.8.0",
    "scikit-image<1.0.0,>=0.21.0",
    "scipy<2.0.0,>=1.11.0",
    "nibabel<6.0.0,>=5.1.0",
    "pydicom<3.0.0,>=2.4.0",
    "openai<2.0.0,>=1.0.0",
    "anthropic<1.0.0,>=0.25.0",
    "rouge-score<1.0.0,>=0.1.2",
    "sacrebleu<3.0.0,>=2.3.1",
    "bert-score<1.0.0,>=0.3.13",
    "torchmetrics[detection]>=1.7.3",
    "haystack-ai>=2.12.0",
    "langchain>=0.3.25",
    "streamlit>=1.28.0",
    "langdetect>=1.0.9",
    "simhash>=2.1.2",
    "readability-lxml>=0.8.4.1",
    "cryptography>=45.0.4",
]
name = "nova-retrieval-vlm"
version = "0.1.0"
description = "Advanced retrieval-augmented medical VLM for NOVA dataset analysis with state-of-the-art reasoning capabilities"
readme = "README.md"

[project.scripts]
nova-vlm = "nova_retrieval_vlm.cli:main"

[dependency-groups]
dev = [
    "pytest<8.0.0,>=7.4.0",
    "pytest-cov<5.0.0,>=4.1.0",
    "black<24.0.0,>=23.7.0",
    "isort<6.0.0,>=5.12.0",
    "ruff<1.0.0,>=0.0.280",
    "mypy<2.0.0,>=1.5.0",
    "pre-commit<4.0.0,>=3.3.0",
]
