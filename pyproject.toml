[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["examples/"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # bandit (security)
    "T20", # flake8-print
    "SIM", # flake8-simplify
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate (commented code)
    "PL",  # pylint
    "PERF", # perflint
]
ignore = [
    "S101",  # assert usage (common in tests)
    "PLR0913", # too many arguments
    "PLR0912", # too many branches
    "PLR0915", # too many statements
    "PLR0911", # too many return statements
    "PLR2004", # magic value used in comparison
    "F722",  # syntax error in forward annotation (jaxtyping)
    "F821",  # undefined name (jaxtyping shape annotations)
    "PLC0415", # import should be at top level (legitimate uses in functions)
    "E501",  # line too long (LaTeX strings, etc.)
    "PTH123", # use pathlib (many legitimate open() uses)
    "PERF203", # try-except in loop (sometimes necessary)
    "SIM116", # use dict instead of if-elif (sometimes clearer as if-elif)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "PLR2004", "PLC0415", "E402", "ARG001"]
"scripts/**/*.py" = ["T201", "S602", "S603", "PLW1510", "E402"]
"run_tests.py" = ["T201", "S603", "PLW1510"]

[tool.ruff.lint.isort]
known-first-party = ["radiant_harness"]
force-single-line = true

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.10"
executionEnvironments = [
    { root = "src" },
    { root = "tests", extraPaths = ["src"] },
    { root = "scripts", extraPaths = ["src"] }
]
reportMissingImports = true
reportMissingTypeStubs = false
reportUnusedImport = false
reportUnusedClass = false
reportUnusedFunction = false
reportDuplicateImport = true
reportUnnecessaryTypeIgnoreComment = false

# Relax type checking for legitimate patterns globally
reportUnknownParameterType = false
reportUnknownArgumentType = false
reportUnknownVariableType = false
reportUnknownMemberType = false
reportMissingParameterType = false
reportArgumentType = false
reportAttributeAccessIssue = false
reportCallIssue = false
reportConstantRedefinition = false

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers --tb=short"
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["radiant_harness"]
omit = [
    "*/tests/*",
    "*/scripts/*",
    "*/migrations/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[project]
authors = [
    {name = "Research Team", email = "research@example.com"},
]
license = {text = "MIT"}
requires-python = ">=3.10,<4.0"
dependencies = [
    # Core runtime
    "loguru",
    "beartype",
    "pillow",
    "numpy",
    "openai",
    "httpx",
    "requests",
    "aiohttp",
    "minijinja>=2.12.0",
    # Optional tooling
    "pytest-asyncio>=0.23.8",
]
name = "radiant-harness"
version = "0.1.0"
description = "Radiant Harness: standalone agentic tool harness for VLMs (radiology-focused)"
readme = "README.md"

[project.scripts]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "pytest-mock",
    "pytest-benchmark",
    "ruff",
    "pyright",
    "pre-commit",
    "jupyterlab",
    "ipywidgets",
    "typeguard",
]
