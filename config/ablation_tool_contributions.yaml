# Ablation Study: Tool Contributions Analysis

defaults:
  - ablation_config

# Focus on tool usage contributions
task: localization
model:
  name: "x-ai/grok-4.1-fast:free"
  temperature: 0.0

agentic:
  enabled: true
  ablation_mode: "tool_contributions"
  single_config: null

  # Tool contribution analysis
  reasoning_enabled: false
  enable_research_metrics: true
  use_tools: true
  max_turns: 10
  use_retrieval: false

  # Tools will be filtered by ablation configurations
  enabled_tools: []
  disabled_tools: []

paths:
  output_dir: "./runs/ablation/tool_contributions"

hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}