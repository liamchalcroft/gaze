# Default NOVA Configuration
# This is the base config that Hydra loads. Override values via command line or other config files.

# Model configuration
model:
  name: "x-ai/grok-4.1-fast:free"
  max_retries: 3
  timeout: 60
  temperature: 0.7
  max_tokens: 4096

# Processing configuration
batch_size: 2
max_iterations: 5
request_delay: 3.0
skip_existing: true

# Agentic configuration
agentic:
  enabled: false
  use_tools: true
  max_turns: 10
  confidence_threshold: 0.7
  reasoning_enabled: false
  reasoning_effort: "high"
  enable_research_metrics: true
  enable_caching: true
  enabled_tools: []
  disabled_tools: []
  single_shot: false

# Paths configuration
paths:
  data_dir: "./data/nova"
  output_dir: "./runs"

# Visualization configuration
visualization:
  num_samples: 5
  out_dir: null
  trust_remote_code: false
  overlay: false

# Task (optional - unified processors handle all tasks)
task: null

# Prompt text
prompt_text: ""

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}

