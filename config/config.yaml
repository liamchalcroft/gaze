# NOVA Retrieval VLM Configuration

defaults:
  - _self_

# Task configuration - use enum values
task: LOCALIZATION
batch_size: 4
skip_existing: true

# Model configuration - updated to use Grok 4.1 as default
model:
  name: "x-ai/grok-4.1-fast:free"
  max_retries: 3
  timeout: 60
  temperature: 0.7
  max_tokens: 1024

# Paths configuration
paths:
  data_dir: "./data/nova"
  output_dir: "./runs"

# Agentic configuration
agentic:
  enabled: false
  use_tools: true
  max_turns: 10
  reasoning_enabled: false
  enable_research_metrics: true
  enabled_tools: []
  disabled_tools: []
  single_shot: false
  use_retrieval: false

# Processing settings
max_iterations: 5
request_delay: 3.0

# Visualization configuration
visualization:
  num_samples: 5
  out_dir: null
  trust_remote_code: false
  overlay: false

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}