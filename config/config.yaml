# NOVA Retrieval VLM Configuration

defaults:
  - _self_

# Task configuration
task: localization
batch_size: 4
use_retrieval: false
skip_existing: true
output_dir: ./runs

# Model configuration
model:
  name: "openai/gpt-4o"
  max_retries: 3
  timeout: 60
  temperature: 0.7
  max_tokens: 1024

# Retrieval configuration
retrieval:
  type: hybrid
  top_k: 5
  hybrid_ratio: 0.5

# Paths configuration
paths:
  data_dir: "./data/nova"
  index_dir: "./indexes"
  output_dir: "./runs"

# Processing settings
max_iterations: 5
request_delay: 3.0
strict_mode: true

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}