# NOVA Agentic with Tools (No Reasoning) Evaluation Configuration
# Performs unified multi-task analysis with visual tools but no reasoning

# Model configuration
model:
  name: "x-ai/grok-4.1-fast:free"
  max_retries: 3
  timeout: 60
  temperature: 0.7
  max_tokens: 8192

# Processing configuration
batch_size: 2
max_iterations: 3
request_delay: 3.0
skip_existing: false

# Agentic configuration (multi-turn with visual tools and reasoning)
agentic:
  enabled: true
  use_tools: true  # Visual tools enabled
  max_turns: 10
  reasoning_enabled: true  # Reasoning enabled
  reasoning_effort: "high"  # High effort for comprehensive analysis
  enable_research_metrics: false
  enable_caching: true  # Enable prompt caching for performance

# Paths configuration
paths:
  data_dir: "./data/nova"
  output_dir: "./runs/agentic_tools_reasoning"

# Visualization configuration
visualization:
  num_samples: 5
  out_dir: null
  trust_remote_code: false
  overlay: false

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}