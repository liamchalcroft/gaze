# NOVA Agentic Evaluation Configuration
# Multi-turn analysis with model-controlled continuation

# Model configuration
model:
  name: "x-ai/grok-4.1-fast:free"
  max_retries: 3
  timeout: 60
  temperature: 0.7
  max_tokens: 8192

# Processing configuration
batch_size: 2
max_iterations: 15
request_delay: 3.0
skip_existing: false

# Agentic configuration (true multi-turn analysis)
agentic:
  enabled: true
  use_tools: false  # No visual tools for pure multi-turn reasoning
  max_turns: 10     # Allow multiple turns with 'continue' field control
  reasoning_enabled: false  # Model reasoning disabled
  reasoning_effort: "medium"
  enable_research_metrics: false
  enable_caching: true

# Paths configuration
paths:
  data_dir: "./data/nova"
  output_dir: "./runs/agentic"

# Visualization configuration
visualization:
  num_samples: 5
  out_dir: null
  trust_remote_code: false
  overlay: false

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}