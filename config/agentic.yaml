# NOVA Agentic Evaluation Configuration
# Performs unified multi-task analysis with agentic reasoning and tools

# Use LOCALIZATION as representative task - prompts handle all tasks
task: LOCALIZATION

# Model configuration
model:
  name: "x-ai/grok-4.1-fast:free"
  max_retries: 3
  timeout: 60
  temperature: 0.7
  max_tokens: 1024

# Processing configuration
batch_size: 2  # Smaller batch for agentic processing
max_iterations: 5
request_delay: 3.0
skip_existing: true

# Agentic configuration (enabled for multi-turn analysis)
agentic:
  enabled: true
  use_tools: true
  max_turns: 10
  reasoning_enabled: true
  enable_research_metrics: true

# Paths configuration
paths:
  data_dir: "./data/nova"
  output_dir: "./runs/agentic"

# Visualization configuration
visualization:
  num_samples: 5
  out_dir: null
  trust_remote_code: false
  overlay: false

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}