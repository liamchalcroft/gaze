name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync
    - name: Run pre-commit
      run: uv run pre-commit run --all-files --show-diff-on-failure

  check:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # macOS is the primary development platform; verify on it too.
          - os: macos-latest
            python-version: "3.14"
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync
    - name: Run linting
      run: uv run ruff check .
    - name: Check formatting
      run: uv run ruff format --check .
    - name: Run type checking
      run: uv run pyright src/
    - name: Verify lockfile is in sync
      run: uv lock --check
    - name: Run tests
      run: uv run pytest tests/ --cov=gaze --cov-report=xml
    - name: Upload coverage to Codecov
      # Public-repo tokenless upload via OIDC; only one matrix leg uploads.
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Install dependencies with NOVA extras
      run: uv sync --extra nova
    - name: Run torch-gated core tests + example suites with full coverage
      # The nova extra provides torch/datasets, so the torch-gated tests in
      # tests/ (which the base check job skips) actually execute here, along
      # with every example's smoke tests. Coverage spans the core library, the
      # HuggingFace adapter, and the NOVA example package (none of which the
      # core check job measures).
      #
      # Deterministic order (-p no:randomly): the NOVA example tests import the
      # example package under two paths (src.* and examples.nova.src.*), so a
      # shuffled run can load it twice as distinct modules and trip beartype
      # class-identity checks. Order-dependence in the library is policed by the
      # randomised check jobs on tests/.
      run: |
        uv run pytest tests/ examples/ --ignore=examples/aiih2026_paper -p no:randomly \
          --cov=gaze --cov=examples/nova/src --cov-report=xml:coverage-full.xml --tb=short
    - name: Upload full coverage to Codecov
      # One matrix leg uploads to avoid duplicate integration coverage reports.
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        files: ./coverage-full.xml
        flags: integration
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory: surfaces dependency vulnerabilities without blocking merges.
    continue-on-error: true
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Audit locked dependencies
      run: |
        uv export --frozen --no-emit-project --no-hashes --format requirements-txt > /tmp/requirements.txt
        uvx pip-audit --requirement /tmp/requirements.txt

  ci-success:
    # Single required status check for branch protection: succeeds only when
    # every required job above succeeded. The advisory `security` job is
    # intentionally excluded.
    if: always()
    needs: [pre-commit, check, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Verify required jobs succeeded
      if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      run: |
        echo "::error::One or more required CI jobs failed."
        exit 1
