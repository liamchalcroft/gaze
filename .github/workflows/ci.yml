name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync

    - name: Code quality checks
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run pyright src/

    - name: Run tests
      run: |
        uv run pytest tests/ -x --tb=short

    - name: Test scripts
      run: |
        python scripts/run_nova_evaluation.py --help
        python scripts/analyze_results.py --help
        ./scripts/eval_nova.sh help