name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run linting
      run: uv run ruff check .

    - name: Check formatting
      run: uv run ruff format --check .

    - name: Run type checking
      run: uv run pyright src/

    - name: Verify lockfile is in sync
      run: uv lock --check

    - name: Run tests
      run: uv run pytest tests/ -x --cov=radiant_harness --cov-report=xml

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies with NOVA extras
      run: uv sync --extra nova

    - name: Run NOVA tests
      run: |
        if uv run python -c "import torch" 2>/dev/null; then
          uv run pytest examples/nova/tests/ -x --tb=short
        else
          echo "Skipping NOVA tests (torch not available)"
        fi
