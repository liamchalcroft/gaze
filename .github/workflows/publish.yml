name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Verify release tag matches package version
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        PKG="$(grep -oE '__version__ = "[^"]+"' src/gaze/__init__.py | cut -d'"' -f2)"
        echo "tag=$TAG package=$PKG"
        if [ "$TAG" != "$PKG" ]; then
          echo "::error::Release tag '$TAG' does not match package version '$PKG'"
          exit 1
        fi
    - name: Install dependencies
      run: uv sync
    - name: Quality gate before release
      # Re-run the full gate against the tagged commit so a release can never
      # ship an artifact that would have failed CI.
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run pyright src/
        uv lock --check
        uv run pytest tests/ -q
    - name: Build package
      run: uv build
    - name: Check metadata
      run: uvx twine check dist/*
    - name: Generate SBOM (CycloneDX)
      run: |
        uv export --frozen --no-emit-project --no-hashes --format requirements-txt > requirements.txt
        uvx --from cyclonedx-bom cyclonedx-py requirements requirements.txt -o sbom.cdx.json
    - name: Upload dist artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dist
        path: dist/
    - name: Upload SBOM
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: sbom
        path: sbom.cdx.json

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    environment: pypi
    permissions:
      id-token: write
    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
        path: dist/
    - name: Publish to PyPI
      # Trusted Publishing (OIDC); PEP 740 attestations are generated by default.
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
