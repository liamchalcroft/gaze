name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.11"
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
    - name: Verify release tag matches package version
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        PKG="$(grep -oE '__version__ = "[^"]+"' src/gaze/__init__.py | cut -d'"' -f2)"
        echo "tag=$TAG package=$PKG"
        if [ "$TAG" != "$PKG" ]; then
          echo "::error::Release tag '$TAG' does not match package version '$PKG'"
          exit 1
        fi
    - name: Install dependencies
      run: uv sync
    - name: Quality gate before release
      # Re-run the full gate against the tagged commit so a release can never
      # ship an artifact that would have failed CI.
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run pyright src/
        uv lock --check
        uv run pytest tests/ -q
    - name: Build package
      run: uv build
    - name: Check metadata
      run: uvx twine check dist/*
    - name: Generate SBOM (CycloneDX)
      run: |
        uv export --frozen --no-emit-project --no-hashes --format requirements-txt > requirements.txt
        uvx --from cyclonedx-bom cyclonedx-py requirements requirements.txt -o sbom.cdx.json
    - name: Upload dist artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: dist
        path: dist/
    - name: Upload SBOM
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: sbom
        path: sbom.cdx.json

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    environment: pypi
    permissions:
      id-token: write
    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: dist
        path: dist/
    - name: Publish to PyPI
      # Trusted Publishing (OIDC); PEP 740 attestations are generated by default.
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
