nice_urls:
  - https://www.nice.org.uk/guidance
radiopaedia_urls:
  - https://radiopaedia.org/articles
mriquestions_urls:
  - https://mriquestions.com
aan_urls:
  - https://www.aan.com/practice/guidelines
acr_urls:
  - https://www.acr.org/Clinical-Resources/Practice-Parameters-and-Technical-Standards
rcr_urls:
  - https://www.rcr.ac.uk/our-services/all-our-publications/clinical-radiology-publications/

settings:
  # --------------------------------------------------------------
  # Ingestion / chunking parameters — tuned for E5 embeddings +
  # BM25 fusion.  The chunk size of ~800 characters (~130-150
  # tokens) yields a good balance between context and recall, while
  # 20 % overlap prevents cutting sentences mid-way.
  # --------------------------------------------------------------
  chunk_size: 800          # characters
  chunk_overlap: 160       # 20 % of chunk_size

  # Crawler behaviour - more aggressive for discovery
  crawl_depth: 5           # increased from 3 to 5 for more discovery
  request_delay: 0.5       # reduced from 1.5 to 0.5 seconds for faster crawling
  download_timeout: 10     # seconds – new field honoured by ingest_nice

  # Patterns of URLs to skip early (regex OR-ed inside ingest code)
  skip_url_patterns:
    - "\\?.*page="      # paginated search/query strings
    - "/(search|filter)/"
    - "calendar"          # event calendars rarely contain guidelines

  include_keywords:
    - mri
    - magnetic resonance
    - brain
    - cerebral
    - neuro
    - neuroradiology
    - intracranial
    - head
    # Common brain pathologies / anomalies
    - tumor
    - tumour
    - neoplasm
    - mass
    - lesion
    - lesions
    - glioma
    - glioblastoma
    - meningioma
    - metastasis
    - metastases
    - stroke
    - ischemia
    - ischaemia
    - hemorrhage
    - haemorrhage
    - aneurysm
    - aneurysms
    - avm
    - arteriovenous malformation
    - infarct
    - infarction
    - tia
    - "transient ischemic"
    - demyelination
    - demyelinating
    - "multiple sclerosis"
    - ms
    - leukodystrophy
    - dementia
    - alzheimer
    - parkinson
    - huntington
    - epilepsy
    - seizure
    - seizures
    - encephalitis
    - meningitis
    - abscess
    - infection
    - encephalopathy
    - hydrocephalus
    - ventriculomegaly
    - atrophy
    - "white matter"
    - "traumatic brain injury"
    - tbi
    - concussion
    # Imaging technique keywords – extra synonyms
    - mra
    - dwi
    - flair
    - t2star

    # Neuro-vascular / haemorrhage terms
    - sah
    - ich
    - intracerebral haemorrhage
    - subarachnoid haemorrhage

    # Skull-base / cranial nerve regions
    - sellar
    - parasellar
    - pituitary

    # Imaging plane / geometry terms
    - axial
    - coronal
    - sagittal
    - transverse
    - oblique

  exclude_keywords:
    - chest
    - lung
    - thoracic
    - abdomen
    - abdominal
    - pelvis
    - pelvic
    - prostate
    - cardiac
    - heart
    - liver
    - kidney
    - renal
    - pancreas
    - breast
    - musculoskeletal
    - shoulder
    - knee
    - hip
    - ankle
    - foot
    - wrist
    - hand
    - elbow
    - obstetric
    - gynecology
    - gynaecology
    - fetal
    - obstetrics
    - maternity
    - breastfeeding 